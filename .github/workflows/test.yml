name: Test

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  unit-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Run unit tests
        run: |
          chmod +x tests/unit/*.sh src/hooks/*.sh src/lib/*.sh
          bash tests/unit/test-hooks.sh

  integration-tests:
    runs-on: ubuntu-latest
    needs: unit-tests
    steps:
      - uses: actions/checkout@v4
      - name: Run integration tests
        run: |
          chmod +x tests/integration/*.sh src/hooks/*.sh src/lib/*.sh
          bash tests/integration/test-full-session.sh
