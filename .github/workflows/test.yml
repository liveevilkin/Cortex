name: Test

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  # ── Bash hook tests ──
  bash-unit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Run bash unit tests
        run: |
          chmod +x tests/unit/*.sh src/hooks/*.sh src/lib/*.sh
          bash tests/unit/test-hooks.sh

  bash-integration:
    runs-on: ubuntu-latest
    needs: bash-unit
    steps:
      - uses: actions/checkout@v4
      - name: Run bash integration tests
        run: |
          chmod +x tests/integration/*.sh src/hooks/*.sh src/lib/*.sh
          bash tests/integration/test-full-session.sh

  # ── MCP server tests ──
  mcp-build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: mcp-server
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: mcp-server/package-lock.json
      - run: npm ci --ignore-scripts
      - run: npx tsc --noEmit

  mcp-smoke:
    runs-on: ubuntu-latest
    needs: mcp-build
    defaults:
      run:
        working-directory: mcp-server
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: mcp-server/package-lock.json
      - run: npm ci --ignore-scripts
      - run: npx tsc
      - name: Smoke test (startup + tools)
        run: |
          timeout 15 node --input-type=module -e "
          import { spawn } from 'node:child_process';
          const p = spawn('node', ['dist/index.js'], { stdio: ['pipe', 'pipe', 'pipe'], env: { ...process.env, MCP_MEMORY_LOG_LEVEL: 'error' } });
          let out = '';
          p.stdout.on('data', d => out += d.toString());
          p.stderr.on('data', () => {});
          p.on('exit', code => { if (code !== 0) process.exit(1); });
          p.stdin.write(JSON.stringify({jsonrpc:'2.0',id:1,method:'initialize',params:{protocolVersion:'2024-11-05',capabilities:{},clientInfo:{name:'ci',version:'1'}}})+'\n');
          await new Promise(r=>setTimeout(r,5000));
          p.stdin.write(JSON.stringify({jsonrpc:'2.0',id:2,method:'tools/list',params:{}})+'\n');
          await new Promise(r=>setTimeout(r,3000));
          const hasTools = out.includes('memory_search');
          if (!hasTools) { console.error('FAIL: tools not found'); process.exit(1); }
          console.log('PASS: MCP server started and responded');
          p.kill();
          " 2>&1

  # ── Docker build test ──
  docker:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build Docker image
        run: docker build -t cortex:ci ./mcp-server
